<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />

  <title>Casi Bros Property Development</title>

  <meta
    name="description"
    content="Casi Bros Property Development serves Western North Carolina by buying undervalued homes, renovating them into modern living spaces, and selling or renting them."
  />

  <style>
    :root {
      --navy: #0b3f79;
      --navy-dark: #082f5c;
      --red: #b3202b;
      --red-dark: #8f1821;
      --white: #ffffff;
      --off-white: #f6f8fb;
      --light-blue: #e8f0f8;
      --text: #142033;
      --muted: #65758b;
      --border: #d9e2ec;
      --shadow: 0 24px 60px rgba(8, 47, 92, 0.14);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "SF Pro Display",
        "Helvetica Neue",
        Helvetica,
        Arial,
        sans-serif;
      color: var(--text);
      background: var(--off-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: 800;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--red);
      color: var(--white);
      box-shadow: 0 14px 30px rgba(179, 32, 43, 0.28);
    }

    .btn-primary:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--navy);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--navy);
      transform: translateY(-2px);
    }

    .btn:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .choice:focus-within {
      outline: 3px solid rgba(179, 32, 43, 0.28);
      outline-offset: 3px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #ffffff;
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .logo img {
      width: 235px;
      height: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
      color: var(--navy);
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .nav-links a:hover {
      color: var(--red);
    }

    .nav .btn {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      padding: 12px 20px;
    }

    .hero {
      position: relative;
      padding: 92px 0 78px;
      background:
        radial-gradient(circle at top left, rgba(179, 32, 43, 0.11), transparent 34%),
        linear-gradient(135deg, #ffffff 0%, #eef4fa 100%);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -140px;
      top: 80px;
      width: 420px;
      height: 420px;
      background: rgba(11, 63, 121, 0.08);
      border-radius: 50%;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 56px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      margin-bottom: 24px;
      border-radius: 999px;
      background: var(--light-blue);
      color: var(--navy);
      font-size: 0.86rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      background: var(--red);
      border-radius: 50%;
    }

    h1 {
      max-width: 720px;
      font-size: clamp(2.7rem, 5.8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.045em;
      color: var(--navy-dark);
      font-weight: 700;
      margin-bottom: 26px;
    }

    .hero-copy {
      max-width: 600px;
      color: var(--muted);
      font-size: 1.16rem;
      line-height: 1.48;
      margin-bottom: 30px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 36px;
    }

    .hero-points {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 650px;
    }

    .hero-point {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(8, 47, 92, 0.06);
    }

    .hero-point strong {
      display: block;
      color: var(--red);
      font-size: 1.65rem;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-point span {
      color: var(--navy);
      font-weight: 800;
      font-size: 0.92rem;
    }

    .hero-visual {
      min-height: 570px;
      border-radius: 36px;
      padding: 24px;
      background:
        linear-gradient(to bottom, rgba(8, 47, 92, 0.08), rgba(8, 47, 92, 0.42)),
        url("images/hero-house.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .visual-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 26px;
      padding: 26px;
    }

    .visual-card small {
      display: block;
      color: var(--red);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .visual-card h3 {
      color: var(--navy-dark);
      font-size: 1.45rem;
      line-height: 1.18;
      letter-spacing: -0.02em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .visual-card p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
      max-width: 50ch;
    }

    section {
      padding: 84px 0;
    }

    .section-heading {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 44px;
      align-items: end;
      margin-bottom: 38px;
    }

    .section-heading h2 {
      color: var(--navy-dark);
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .section-heading p {
      color: var(--muted);
      font-size: 1.06rem;
      line-height: 1.52;
      max-width: 54ch;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 14px 34px rgba(8, 47, 92, 0.07);
    }

    .card-number {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: var(--light-blue);
      color: var(--red);
      font-weight: 900;
      margin-bottom: 22px;
    }

    .card h3 {
      color: var(--navy-dark);
      font-size: 1.28rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .dark-section {
      background: var(--navy-dark);
      color: var(--white);
      border-radius: 38px;
      padding: 58px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .dark-section::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(179, 32, 43, 0.28);
    }

    .dark-section .section-heading {
      position: relative;
      z-index: 1;
    }

    .dark-section h2 {
      color: var(--white);
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .dark-section p {
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.52;
    }

    .process-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      counter-reset: process;
    }

    .process-step {
      counter-increment: process;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      padding: 24px;
    }

    .process-step::before {
      content: "0" counter(process);
      color: #ffffff;
      background: var(--red);
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      font-weight: 900;
      margin-bottom: 28px;
    }

    .process-step h3 {
      font-size: 1.12rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .process-step p {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.95rem;
      line-height: 1.48;
    }

    .property-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .property-card {
      min-height: 390px;
      border-radius: 32px;
      padding: 28px;
      display: flex;
      align-items: flex-end;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .property-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8, 47, 92, 0.78), rgba(8, 47, 92, 0.08));
    }

    .property-content {
      position: relative;
      color: var(--white);
      max-width: 560px;
    }

    .property-content h3 {
      font-size: 1.75rem;
      line-height: 1.12;
      letter-spacing: -0.03em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .property-content p {
      color: rgba(255, 255, 255, 0.82);
      line-height: 1.48;
      max-width: 46ch;
    }

    .property-side {
      display: grid;
      gap: 18px;
    }

    .property-side .property-card {
      min-height: 186px;
    }

    .cta {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 34px;
      align-items: center;
      background: linear-gradient(135deg, var(--navy-dark), var(--navy));
      color: var(--white);
      border-radius: 38px;
      padding: 60px;
      box-shadow: var(--shadow);
    }

    .cta h2 {
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .cta p {
      color: rgba(255, 255, 255, 0.76);
      font-size: 1.06rem;
      line-height: 1.5;
      max-width: 58ch;
    }

    .submission-layout {
      display: grid;
      grid-template-columns: 0.88fr 1.12fr;
      gap: 22px;
      align-items: start;
    }

    .submission-copy,
    .submission-form-card {
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--white);
      box-shadow: 0 16px 38px rgba(8, 47, 92, 0.08);
    }

    .submission-copy {
      padding: 22px;
      position: sticky;
      top: 110px;
      overflow: hidden;
    }

    .submission-copy::after {
      content: "";
      position: absolute;
      right: -90px;
      top: -90px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(179, 32, 43, 0.07);
    }

    .submission-copy h3 {
      color: var(--navy-dark);
      font-size: 1.62rem;
      line-height: 1.12;
      letter-spacing: -0.03em;
      font-weight: 700;
      margin: 14px 0 10px;
    }

    .submission-copy p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .info-list {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .info-list li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 12px;
      align-items: start;
      color: var(--navy-dark);
      font-weight: 700;
    }

    .info-list li::before {
      content: "";
      width: 18px;
      height: 18px;
      margin-top: 5px;
      border-radius: 50%;
      background: rgba(179, 32, 43, 0.12);
      box-shadow: inset 0 0 0 6px rgba(179, 32, 43, 0.88);
    }

    .info-note {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--light-blue);
      color: var(--navy-dark);
      font-size: 0.92rem;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }

    .submission-form-card {
      padding: 12px;
      font-family: inherit;
    }

    .property-form {
      display: grid;
      gap: 10px;
      font-family: inherit;
      letter-spacing: -0.01em;
    }

    .form-status {
      display: none;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      font-weight: 700;
    }

    .form-status.is-visible {
      display: block;
    }

    .form-status.success {
      color: #0f5132;
      background: #eaf6ef;
      border-color: #bfe6cd;
    }

    .form-status.error {
      color: #842029;
      background: #fbeaec;
      border-color: #f3c369;
    }

    .form-section {
      padding: 12px;
      border-radius: 16px;
      background: #f8fbfe;
      border: 1px solid var(--border);
    }

    .form-section h3 {
      color: var(--navy-dark);
      font-size: 1.08rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-items: start;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
      align-content: start;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label,
    .field legend {
      color: var(--navy-dark);
      font-weight: 600;
      font-size: 0.89rem;
      letter-spacing: -0.01em;
      margin-bottom: 0;
    }

    .field-hint {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.15;
      margin-top: 0;
      max-width: 42ch;
    }

    .field entry {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      height: 44px;
      padding: 0 12px;
      line-height: 44px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 0.96rem;
      font-weight: 400;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
